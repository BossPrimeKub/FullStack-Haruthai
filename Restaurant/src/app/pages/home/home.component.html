<section class="relative h-screen w-full overflow-hidden">
  <div class="absolute inset-0">
    <div *ngFor="let slide of slides; let i = index"
      class="absolute inset-0 transition-opacity duration-1000"
      [class.opacity-100]="currentSlide === i"
      [class.opacity-0]="currentSlide !== i">
      <img [src]="slide.image" [alt]="slide.alt"
        class="w-full h-full object-cover brightness-40"
        [attr.loading]="i === 0 ? 'eager' : 'lazy'">
    </div>
  </div>

  <div class="relative z-10 h-full flex flex-col items-center justify-center text-center px-6">
    <h2 class="font-['Cormorant_Garamond'] text-lg tracking-[0.3em] text-[#d4a853]/80 uppercase mb-4">
      Welcome to
    </h2>
    <h1 class="font-['Cormorant_Garamond'] text-8xl font-semibold">Savoria</h1>
    <p class="mt-6 text-lg text-[#737373] max-w-xl">
      Fine dining experience with authentic Thai cuisine
    </p>
    <div class="mt-10 flex gap-4">
      <a routerLink="/reservations" class="px-8 py-4 bg-[#d4a853] text-[#0d0d0d] font-semibold rounded-lg">
        Book a Table
      </a>
      <a routerLink="/menu" class="px-8 py-4 border border-[#f5f5f5]/30 text-[#f5f5f5] rounded-lg">
        View Menu
      </a>
    </div>
  </div>

  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-20 flex gap-3">
    <button *ngFor="let slide of slides; let i = index"
      class="slide-dot" [class.active]="currentSlide === i"
      (click)="goToSlide(i)">
    </button>
  </div>
</section>
